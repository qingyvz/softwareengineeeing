server:
  port: 9500
  tomcat:
    connection-timeout: 60000
    accept-count: 100

spring:
  application:
    name: wisepen-document-service
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces: [VMnet.*, vEthernet.*, docker0]
      preferred-networks: [10]
  profiles:
    active: dev
  # 解释：Nacos 里的配置大概率写的是内部容器名 (如 kafka:9092)。
  # 你在本地跑，必须强行覆盖为开发服务器的外网透传端口 (9094)，否则连不上 MQ！

  kafka:
      bootstrap-servers: wisepen-dev-server:9094



  
jodconverter:
  local:
    enabled: false
  remote:
    enabled: true
    url: http://localhost:8100/


logging:
  level:
    root: INFO
    org.jodconverter: DEBUG
    com.oriole.wisepen.file: INFO

