spring:
  main:
    allow-bean-definition-overriding: true

  # Elasticsearch：本地 Docker 启动的 ES + IK 分词器；线上推荐放 Nacos wisepen-common-dev.yaml
  elasticsearch:
    uris: http://127.0.0.1:9200
    connection-timeout: 5s
    socket-timeout: 30s
    username: ""
    password: ""

  # Kafka 全局消费者默认配置；搜索模块的 DocumentReady / NoteSnapshot 消费者通过
  # searchRawStringContainerFactory 覆盖为 StringDeserializer，不受这里影响。
  kafka:
    consumer:
      auto-offset-reset: latest
      properties:
        spring.json.trusted.packages: "com.oriole.wisepen.*"

logging:
  level:
    root: INFO
    com.oriole.wisepen.resource: INFO
