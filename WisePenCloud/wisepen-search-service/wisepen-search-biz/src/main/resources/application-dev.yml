server:
  port: 9500
  tomcat:
    connection-timeout: 60000
    accept-count: 100

spring:
  application:
    name: wisepen-document-service
  main:
    allow-bean-definition-overriding: true

  # =========================================================
  # 🌐 1. 连接远程开发环境的 Nacos (强行指定远程地址)
  # =========================================================
  cloud:
    nacos:
      discovery:
        server-addr: wisepen-dev-server:8848
        username: nacos
        password: oriole003
      config:
        server-addr: wisepen-dev-server:8848
        username: nacos
        password: oriole003
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-dev.yaml
            group: DEFAULT_GROUP
            refresh: true

    inetutils:
      ignored-interfaces: [VMnet.*, vEthernet.*, docker0]
      preferred-networks: [10] # 注意：如果你们 Nacos 报错，这行可能需要注释掉，因为它限制了只绑定 10.x 网段的内网 IP

  profiles:
    active: dev

  # =========================================================
  # 🚀 2. 补上连接远程开发环境的 Kafka
  # （文档服务要把解析好的消息发出去，必须配 Kafka）
  # =========================================================
  kafka:
    bootstrap-servers: wisepen-dev-server:9094

# =========================================================
# 📄 3. 远端文档格式转换服务 (指向公共开发服务器)
# =========================================================
jodconverter:
  local:
    enabled: false
  remote:
    enabled: true
    url: http://wisepen-dev-server:8100/

logging:
  level:
    root: INFO
    org.jodconverter: DEBUG
    com.oriole.wisepen.file: INFO