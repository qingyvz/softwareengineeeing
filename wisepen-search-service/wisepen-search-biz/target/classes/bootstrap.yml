server:
  port: 9310 

spring:
  application:
    name: wisepen-search-service
  cloud:
    nacos:
      discovery:
        server-addr: wisepen-dev-server:8848
        # 【修改这里】加上 :nacos 作为默认值
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:oriole003}
      config:
        server-addr: wisepen-dev-server:8848
        # 【修改这里】加上 :nacos 作为默认值
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:oriole003}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: wisepen-common-${spring.profiles.active}.yaml
            group: DEFAULT_GROUP
            refresh: true
    inetutils:
      ignored-interfaces:
        - VMnet.*
        - vEthernet.*
        - docker0
      preferred-networks:
        - 10
  profiles:
    active: dev