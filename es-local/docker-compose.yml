version: '3.8'

services:
  # 1. Elasticsearch 引擎
  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: wisepen-es-local
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false 
      - ES_JAVA_OPTS=-Xms512m -Xmx512m 
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      # - ./ik:/usr/share/elasticsearch/plugins/ik
      - es_data:/usr/share/elasticsearch/data
    networks:
      - wisepen-net

  # 2. Kibana 控制台 (用于调试 ES)
  kibana:
    image: kibana:8.12.2
    container_name: wisepen-kibana-local
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - wisepen-net

  # # 3. 关系型数据库 MySQL 8.0
  # mysql:
